<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Immersion Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <header>
    <h1>Work Immersion Tracker</h1>
    <p>Track your 80-hour immersion progress</p>
  </header>

  <!-- Admin / Teacher Login Area -->
  <div class="admin-login" style="margin: 20px 0; text-align: center;">
    <button id="adminBtn">Teacher/Admin Login</button>
    <div id="adminPanel" style="display:none; margin-top:15px;">
      <p>Logged in as Teacher</p>
      <button onclick="logoutAdmin()">Logout</button>
    </div>
  </div>

  <div class="form">
    <div class="input-group">
      <label>Date</label>
      <input type="date" id="date">
    </div>

    <div class="input-group">
      <label>Task</label>
      <input type="text" id="task" placeholder="Task description">
    </div>

    <div class="input-group">
      <label>Hours</label>
      <input type="number" id="hours" placeholder="Hours" step="0.5" min="0">
    </div>

    <button onclick="addLog()">Add Log</button>
  </div>

  <div id="dtr">
    <h3>Total Hours: <span id="totalHours">0</span> / 80</h3>

    <div class="progressBar">
      <div id="progress"></div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Task</th>
            <th>Hours</th>
            <th>Status</th>
            <th class="admin-only">Teacher</th>
            <th class="admin-only">Action</th>
          </tr>
        </thead>
        <tbody id="logTable"></tbody>
      </table>
    </div>
  </div>

  <div class="download-area">
    <button class="download-btn" onclick="downloadPDF()">Download DTR (PDF)</button>
  </div>
</div>

<!-- html2pdf library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="script.js"></script>
</body>
</html>
